# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
unbind = SUPER, SPACE # omarchy launcher
unbind = SUPER, J # old toggle splitscreen
unbind = SUPER, K # old show keybinds
unbind = SUPER, L # old change between dwindle and scrolling layout
unbind = SUPER, F # old fullscreen
unbind = SUPER SHIFT, F # old fullscreen
unbind = SUPER ALT, S # old move window to scratchpad
unbind = SUPER CTRL, S # TODO: old share (add keybind for this later)

bindd = SUPER, R, Launch apps, exec, omarchy-launch-walker
bindd = SUPER SHIFT, R, Omarchy menu, exec, omarchy-menu
bindd = SUPER, backslash, Show key bindings, exec, omarchy-menu-keybindings

bindd = SUPER, H, Focus on left window, movefocus, l
bindd = SUPER, L, Focus on right window, movefocus, r
bindd = SUPER, K, Focus on above window, movefocus, u
bindd = SUPER, J, Focus on below window, movefocus, d

bindd = SUPER ALT, H, Swap window to the left, swapwindow, l
bindd = SUPER ALT, L, Swap window to the right, swapwindow, r
bindd = SUPER ALT, K, Swap window up, swapwindow, u
bindd = SUPER ALT, J, Swap window down, swapwindow, d

bindd = SUPER SHIFT ALT, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d

bindd = SUPER CTRL, H, Move window to group on left, moveintogroup, l
bindd = SUPER CTRL, L, Move window to group on right, moveintogroup, r
bindd = SUPER CTRL, K, Move window to group on top, moveintogroup, u
bindd = SUPER CTRL, J, Move window to group on bottom, moveintogroup, d

bindd = SUPER SHIFT, F, Fullscreen, fullscreen, 0
bindd = SUPER, F, Fullscreen respecting gaps, fullscreen, 1

#Captures
bindd = SUPER SHIFT, S, Screenshot, exec, omarchy-capture-screenshot
bindd = SUPER ALT, S, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL, S, Extract text (OCR) from screenshot, exec, omarchy-capture-text-extraction

